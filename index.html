<body>

<script>
window.addEventListener("DOMContentLoaded", () => {

  const storeURL = "https://msbundle.citygh.com";
  const KEY = "msbundle_last_visit";
  const MINUTES_30 = 30 * 60 * 1000;

  const btn = document.getElementById("enterStoreBtn");
  const text = document.getElementById("countdownText");

  // ---------- NETWORK CHECK ----------
  function isSlowNetwork() {
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

    if (!conn) return false;

    return (
      conn.effectiveType === "slow-2g" ||
      conn.effectiveType === "2g" ||
      (conn.downlink && conn.downlink < 0.5) ||
      (conn.rtt && conn.rtt > 800)
    );
  }

  // ---------- SAFE AUTO REDIRECT (FIXED) ----------
  (function handleAutoRedirect() {

    const lastVisit = localStorage.getItem(KEY);

    // 🚨 FIRST VISIT = ABSOLUTE BLOCK
    if (!lastVisit) {
      return;
    }

    const now = Date.now();
    const diff = now - parseInt(lastVisit, 10);

    // ✅ RETURNING USERS ONLY
    if (diff < MINUTES_30) {
      window.location.replace(storeURL);
    }

  })();

  // ---------- MARK VISIT SAFELY (NO RACE CONDITION) ----------
  setTimeout(() => {
    if (!localStorage.getItem(KEY)) {
      localStorage.setItem(KEY, Date.now());
    }
  }, 1500);

  // ---------- BUTTON CLICK ----------
  btn.addEventListener("click", () => {

    const slowNet = isSlowNetwork();

    if (!slowNet) {
      text.innerText = "Opening now...";
      window.location.href = storeURL;
      return;
    }

    let timeLeft = 3;
    text.innerText = `Opening in ${timeLeft} seconds...`;

    const timer = setInterval(() => {
      timeLeft--;

      if (timeLeft > 0) {
        text.innerText = `Opening in ${timeLeft} seconds...`;
      } else {
        clearInterval(timer);
        text.innerText = "Opening now...";
        window.location.href = storeURL;
      }
    }, 1000);

  });

});
</script>
